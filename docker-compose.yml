services:
  postgres:
    image: postgres:16-alpine
    container_name: richman-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: richman
      POSTGRES_USER: richman
      POSTGRES_PASSWORD: richman
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U richman"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
