<svg viewBox="0 0 64 64" width="64" height="64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Richman logo</title>
  <desc id="logoDesc">Solid sans-serif R monogram centered on a graphite tile.</desc>
  <defs>
    <radialGradient id="tile" cx="32" cy="32" r="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1f1f23"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </radialGradient>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#tile)"/>

  <text
    x="32"
    y="48"
    font-family="'PingFang SC', 'Microsoft YaHei', -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="46"
    font-weight="700"
    fill="#F5F5F7"
    text-anchor="middle"
  >R</text>
</svg>
